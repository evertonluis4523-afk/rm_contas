<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Meus Gastos — Controle Mensal</title>
  <meta name="description" content="Controle de gastos mensais com relatórios e orçamentos. Funciona offline." />
  <meta name="theme-color" content="#0c8f6b" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0f1115" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Meus Gastos" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <!-- Top bar: seletor de mês -->
  <header class="topbar" id="topbar">
    <div class="topbar-in">
      <button class="month-nav" id="prevMonth" aria-label="Mês anterior">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button class="month-label" id="monthLabel" aria-label="Selecionar mês">
        <span id="monthText">—</span>
        <svg viewBox="0 0 24 24" aria-hidden="true" class="chev"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <button class="month-nav" id="nextMonth" aria-label="Próximo mês">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>
  </header>

  <!-- Conteúdo das telas -->
  <main class="view" id="view" role="main"></main>

  <!-- Botão flutuante: novo lançamento -->
  <button class="fab" id="fab" aria-label="Novo lançamento">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
  </button>

  <!-- Navegação inferior -->
  <nav class="tabbar" id="tabbar" role="navigation">
    <button class="tab" data-tab="home" aria-label="Início">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V9.5"/></svg>
      <span>Início</span>
    </button>
    <button class="tab" data-tab="reports" aria-label="Relatórios">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20V4"/><path d="M4 20h16"/><rect x="7" y="12" width="3" height="5"/><rect x="12" y="8" width="3" height="9"/><rect x="17" y="5" width="3" height="12"/></svg>
      <span>Relatórios</span>
    </button>
    <button class="tab" data-tab="budgets" aria-label="Orçamentos">
      <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
      <span>Cuidados</span>
    </button>
    <button class="tab" data-tab="settings" aria-label="Ajustes">
      <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 1 1-4 0v-.1A1.6 1.6 0 0 0 6.6 19l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.6 1.6 0 0 0 3 15H3a2 2 0 1 1 0-4h.1A1.6 1.6 0 0 0 4.9 9L4.8 9A2 2 0 1 1 7.6 6.2l.1.1A1.6 1.6 0 0 0 10 5V4.9A2 2 0 1 1 14 5v.1a1.6 1.6 0 0 0 2.7 1.1l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1A1.6 1.6 0 0 0 21 11h.1A2 2 0 1 1 21 15Z"/></svg>
      <span>Ajustes</span>
    </button>
  </nav>

  <!-- Container de modais / bottom sheets -->
  <div class="scrim" id="scrim" hidden></div>
  <div class="sheet-host" id="sheetHost" aria-live="polite"></div>

  <!-- Toast -->
  <div class="toast" id="toast" role="status" hidden></div>

  <script src="js/app.js"></script>
</body>
</html>
